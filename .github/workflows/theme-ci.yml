name: Theme CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: theme-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-build:
    name: Production build and package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: wp-content/themes/nolan-young-theme-template-01

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wp-content/themes/nolan-young-theme-template-01/package-lock.json

      - name: Report tool versions
        run: |
          node --version
          npm --version

      - name: Install locked Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Build, validate, and package production theme
        run: npm run package

      - name: Verify committed generated assets are current
        run: git diff --exit-code -- assets/css assets/js

      - name: Verify WordPress ZIP integrity and root folder
        shell: bash
        run: |
          set -euo pipefail
          archive="dist/nolan-young-theme-template-01.zip"
          test -f "$archive"
          unzip -t "$archive"

          unexpected_roots="$(unzip -Z1 "$archive" | awk -F/ 'NF { print $1 }' | sort -u | grep -v '^nolan-young-theme-template-01$' || true)"
          if [ -n "$unexpected_roots" ]; then
            echo "Unexpected ZIP root entries:" >&2
            echo "$unexpected_roots" >&2
            exit 1
          fi

      - name: Upload installable theme artifact
        uses: actions/upload-artifact@v7
        with:
          name: nolan-young-theme-template-01
          path: wp-content/themes/nolan-young-theme-template-01/dist/nolan-young-theme-template-01.zip
          if-no-files-found: error
          retention-days: 14

  php-syntax:
    name: PHP syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Validate every PHP file
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find . -type f -name '*.php' \
            -not -path './node_modules/*' \
            -not -path './vendor/*' \
            -not -path './dist/*' -print0)

# This workflow intentionally validates both the source tree and the generated
# WordPress installation archive before changes can be treated as release-ready.
