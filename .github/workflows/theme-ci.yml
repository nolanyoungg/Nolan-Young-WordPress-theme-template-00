name: Theme CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: theme-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-build:
    name: Production build and package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Report tool versions
        run: |
          node --version
          npm --version

      - name: Install locked Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Build, validate, and package production theme
        shell: bash
        run: |
          set -o pipefail
          npm run package 2>&1 | tee production-build.log

      - name: Upload production build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-build-diagnostics
          path: production-build.log
          if-no-files-found: error
          retention-days: 7

      - name: Verify committed generated assets are current
        run: git diff --exit-code -- assets/css assets/js

      - name: Verify WordPress ZIP integrity and root folder
        shell: bash
        run: |
          set -euo pipefail
          archive="dist/nolan-young-theme-template-01.zip"
          test -f "$archive"
          unzip -t "$archive"

          unexpected_roots="$(unzip -Z1 "$archive" | awk -F/ 'NF { print $1 }' | sort -u | grep -v '^nolan-young-theme-template-01$' || true)"
          if [ -n "$unexpected_roots" ]; then
            echo "Unexpected ZIP root entries:" >&2
            echo "$unexpected_roots" >&2
            exit 1
          fi

      - name: Upload installable theme artifact
        uses: actions/upload-artifact@v4
        with:
          name: nolan-young-theme-template-01
          path: dist/nolan-young-theme-template-01.zip
          if-no-files-found: error
          retention-days: 14

  php-quality:
    name: PHP syntax, standards, and compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install locked PHP quality dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Validate every PHP file
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find . -type f -name '*.php' \
            -not -path './node_modules/*' \
            -not -path './vendor/*' \
            -not -path './dist/*' -print0)

      - name: Run WordPress coding standards and PHP compatibility
        shell: bash
        run: |
          set -o pipefail
          vendor/bin/phpcs --report=full --report-width=200 2>&1 | tee phpcs-report.log

      - name: Upload PHP standards diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: phpcs-diagnostics
          path: phpcs-report.log
          if-no-files-found: error
          retention-days: 7

  wordpress-integration:
    name: WordPress PHPUnit, browser, and accessibility
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        working-directory: nolan-young-theme-template-01

    steps:
      - name: Check out source with runtime theme slug
        uses: actions/checkout@v4
        with:
          path: nolan-young-theme-template-01

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nolan-young-theme-template-01/package-lock.json

      - name: Set up PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install locked development dependencies
        run: |
          npm ci --no-audit --no-fund
          composer install --no-interaction --prefer-dist --no-progress

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Start isolated WordPress environments
        run: npm run wp-env -- start

      - name: Activate theme in development and test sites
        run: |
          npm run wp-env -- run cli wp theme activate nolan-young-theme-template-01
          npm run wp-env -- run tests-cli wp theme activate nolan-young-theme-template-01

      - name: Run WordPress PHPUnit suite
        run: npm run wp-env -- run tests-cli --env-cwd=wp-content/themes/nolan-young-theme-template-01 php vendor/bin/phpunit -c phpunit.xml.dist

      - name: Run frontend, mobile-menu, and accessibility smoke tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: nolan-young-theme-template-01/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop isolated WordPress environments
        if: always()
        run: npm run wp-env -- stop
