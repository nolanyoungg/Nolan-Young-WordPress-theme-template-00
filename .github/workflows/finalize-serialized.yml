name: Finalize Serialized Source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hardening-10-of-10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Apply exact source and documentation updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/scss/components/_mega-menu.scss')
          text = path.read_text()
          old = ".nytt01-menu-item--mega.is-open\n\t> .nytt01-menu__trigger\n\t.nytt01-menu__trigger-icon {"
          new = ".nytt01-menu-item--mega.is-open > .nytt01-menu__trigger .nytt01-menu__trigger-icon {"
          if old not in text:
              raise SystemExit('Expected mega-menu selector was not found')
          path.write_text(text.replace(old, new, 1))

          readme = Path('README.md')
          text = readme.read_text()
          text = text.replace('`1.2.1`', '`1.2.2`')
          text = text.replace('Node.js 18.12 or newer', 'Node.js 20.18 or newer')
          text = text.replace('npm 8.19.2 or newer', 'npm 10.0.0 or newer')
          readme.write_text(text)
          PY
      - name: Regenerate production assets
        run: npm run build
      - name: Commit synchronized source and assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/scss README.md assets/css assets/js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: synchronize 1.2.2 source and runtime assets"
          git push origin HEAD:hardening-10-of-10
