name: Fix SCSS Style

on:
  push:
    branches:
      - hardening-10-of-10
    paths:
      - .github/workflows/fix-stylelint.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hardening-10-of-10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx stylelint "src/scss/**/*.scss" --fix
      - name: Commit SCSS fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/scss
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "style: apply Stylelint fixes"
          git pull --rebase origin hardening-10-of-10
          git push origin HEAD:hardening-10-of-10
