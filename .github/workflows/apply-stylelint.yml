name: Apply Stylelint

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hardening-10-of-10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx stylelint "src/scss/**/*.scss" --fix || true
      - name: Commit Stylelint output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/scss
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "style: apply final Stylelint fixes"
          git push origin HEAD:hardening-10-of-10
