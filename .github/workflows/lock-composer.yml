name: Lock Composer Dependencies

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hardening-10-of-10
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2
      - run: composer update --no-interaction --prefer-dist --no-progress
      - name: Commit Composer lockfile
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composer.json composer.lock
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: lock PHPUnit polyfills dependency"
          git pull --rebase origin hardening-10-of-10
          git push origin HEAD:hardening-10-of-10
