name: Refresh Locked Dependencies

on:
  push:
    branches:
      - hardening-10-of-10
    paths:
      - package.json
      - composer.json
      - .github/workflows/refresh-lockfiles.yml

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out hardening branch
        uses: actions/checkout@v4
        with:
          ref: hardening-10-of-10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Lock direct browser-test dependencies
        run: |
          npm install --save-dev --save-exact \
            @axe-core/playwright@latest \
            @playwright/test@latest \
            @wordpress/env@latest \
            --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Set up PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Lock PHP quality dependencies
        run: composer update --no-interaction --prefer-dist --no-progress

      - name: Commit synchronized lockfiles
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json composer.lock

          if git diff --cached --quiet; then
            echo "Lockfiles are already synchronized."
            exit 0
          fi

          git commit -m "chore: lock hardened test dependencies"
          git push origin HEAD:hardening-10-of-10
