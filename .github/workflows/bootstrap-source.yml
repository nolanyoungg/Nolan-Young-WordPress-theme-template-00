name: Bootstrap Theme Source

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bootstrap:
    if: ${{ hashFiles('source-bootstrap.zip') != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand source archive into repository root
        shell: bash
        run: |
          set -euo pipefail
          work_dir="$(mktemp -d)"
          unzip -q source-bootstrap.zip -d "$work_dir"

          source_dir="$work_dir/nolan-young-theme-template-01"
          if [ ! -f "$source_dir/package.json" ] || [ ! -f "$source_dir/style.css" ]; then
            echo "Expected theme source root was not found in source-bootstrap.zip." >&2
            exit 1
          fi

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='source-bootstrap.zip' \
            "$source_dir/" ./

          rm -f source-bootstrap.zip TEST_INIT.txt
          rm -f .github/workflows/bootstrap-source.yml

      - name: Commit authoritative source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all

          if git diff --cached --quiet; then
            echo "No source changes were produced."
            exit 0
          fi

          git commit -m "chore: establish authoritative theme source baseline"
          git push origin HEAD:main
