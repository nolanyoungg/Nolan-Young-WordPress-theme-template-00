name: Finalize Source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hardening-10-of-10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Update README version requirements
        run: |
          sed -i 's/`1.2.1`/`1.2.2`/g' README.md
          sed -i 's/Node.js 18.12 or newer/Node.js 20.18 or newer/g' README.md
          sed -i 's/npm 8.19.2 or newer/npm 10.0.0 or newer/g' README.md
      - run: npm run build
      - name: Commit final source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/css assets/js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "chore: finalize 1.2.2 source state"
          git pull --rebase origin hardening-10-of-10
          git push origin HEAD:hardening-10-of-10
